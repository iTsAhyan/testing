name: Start Stream
on:
  repository_dispatch:
    types: [start-stream, stop-stream]

concurrency:
  group: youtube-live-stream
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Handle Stop Signal
        if: github.event.action == 'stop-stream'
        run: echo "Stop signal received. Active stream has been terminated."

      # এখানে আমরা স্পেসিফিকভাবে স্টেবল ভার্সন '6.1.1' লক করে দিচ্ছি যেন ক্র্যাশ না করে
      - name: Setup FFmpeg
        if: github.event.action == 'start-stream'
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: '6.1.1'

      - name: Download Watermark
        if: github.event.action == 'start-stream'
        run: wget -O watermark.gif https://images.ahyancreations.top/watch.gif

      - name: Start Stream
        if: github.event.action == 'start-stream'
        run: |
          VIDEO_URL="${{ github.event.client_payload.video_url }}"
          STREAM_KEY="${{ github.event.client_payload.stream_key }}"

          echo "Starting stream: $VIDEO_URL"

          # filter_complex অংশটি সহজ ও ক্র্যাশ-ফ্রি করা হয়েছে
          ffmpeg -re \
            -user_agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
            -stream_loop -1 -i "$VIDEO_URL" \
            -ignore_loop 0 -i watermark.gif \
            -filter_complex "[1:v]scale=180:-1[wm];[0:v][wm]overlay=W-w-10:H-h-10:format=auto,format=yuv420p[v]" \
            -map "[v]" -map 0:a? \
            -c:v libx264 -preset veryfast -b:v 2500k -maxrate 2500k -bufsize 5000k \
            -g 60 -pix_fmt yuv420p \
            -c:a aac -b:a 128k -ar 44100 \
            -t 5:55:00 \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
            
